# Netlify config for the FRONTEND (the client/ folder).
# In the Netlify UI you can leave build settings blank — this file drives them.

[build]
  base = "client"
  command = "npm run build"
  publish = "dist"            # relative to base -> client/dist

[build.environment]
  NODE_VERSION = "20"

# ---------------------------------------------------------------------------
# OPTION A (recommended): proxy /api to the Railway backend (no CORS at all).
# Uncomment these 4 lines and replace the host with your Railway URL.
# If you use this, leave VITE_API_BASE_URL UNSET in Netlify (client calls /api).
#
# [[redirects]]
#   from = "/api/*"
#   to = "https://YOUR-APP.up.railway.app/api/:splat"
#   status = 200
#   force = true
# ---------------------------------------------------------------------------

# SPA fallback: serve index.html for client-side routes (React Router).
# Keep this LAST so the /api proxy above (if enabled) matches first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
